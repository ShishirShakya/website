# Pushes the MyST build to the user Pages repo so the site is served at
# https://shishirshakya.github.io/ (not /website/). Requires a repository secret
# GH_PAGES_DEPLOY_TOKEN: a fine-grained PAT with Contents: Read and write on
# ShishirShakya/ShishirShakya.github.io (Classic PAT: repo scope is fine).
name: deploy

on:
  push:
    branches:
      - main

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Build HTML Assets
        env:
          BASE_URL: /
        run: myst build --html

      # If a push is "denied to github-actions[bot]", GH_PAGES_DEPLOY_TOKEN was
      # empty; GITHUB_TOKEN cannot push to another repository.
      - name: Check deploy secret is set
        env:
          DEPLOY_PAT: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_PAT" ]; then
            echo "::error::Set repository secret GH_PAGES_DEPLOY_TOKEN to a PAT with Contents: write on ShishirShakya.github.io"
            exit 1
          fi

      - name: Deploy to shishirshakya.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          publish_dir: _build/html
          publish_branch: main
          external_repository: ShishirShakya/ShishirShakya.github.io
          force_orphan: true
