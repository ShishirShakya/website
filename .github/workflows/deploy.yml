# Pushes the MyST build to the user Pages repo so the site is served at
# https://shishirshakya.github.io/ (not /website/). Requires a repository secret
# GH_PAGES_DEPLOY_TOKEN: a fine-grained PAT with Contents: Read and write on
# ShishirShakya/ShishirShakya.github.io (Classic PAT: repo scope is fine).
name: deploy

on:
  push:
    branches:
      - main

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 18.x

      - name: Install MyST Markdown
        run: npm install -g mystmd

      - name: Build HTML Assets
        env:
          BASE_URL: /
        run: myst build --html

      - name: Deploy to shishirshakya.github.io
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GH_PAGES_DEPLOY_TOKEN }}
          branch: main
          folder: _build/html
          repository-name: ShishirShakya/ShishirShakya.github.io
          clean: true
          single-commit: true
